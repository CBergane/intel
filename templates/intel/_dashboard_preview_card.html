{% load humanize %}
<article data-card-layout="dashboard-preview" class="group flex flex-col rounded-xl border border-line/80 bg-slate-900/60 px-3 py-3 md:min-h-[11.5rem]">
    <div class="flex items-start justify-between gap-2">
        <a href="{{ item.source_browse_url }}" class="min-w-0 max-w-[11rem] truncate text-[11px] font-medium text-slate-300 transition hover:text-white">{{ item.source.name }}</a>
        <time class="shrink-0 text-[10px] text-slate-500" datetime="{{ item.activity_at|date:'c' }}" title="{{ item.activity_at|date:'Y-m-d H:i' }} UTC">
            {{ item.activity_at|naturaltime }}
        </time>
    </div>
    <h3 class="mt-2 text-sm font-medium leading-snug text-white">
        {% if item.url %}
            <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer" class="block hover:text-accent">
                <span class="block overflow-hidden [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2]">
                    {{ item.title }}
                </span>
            </a>
        {% else %}
            <span class="block overflow-hidden [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2]">
                {{ item.title }}
            </span>
        {% endif %}
    </h3>
    {% if item.summary %}
        <p class="mt-1.5 overflow-hidden text-[13px] leading-5 text-slate-400 [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2]">
            {{ item.summary|striptags }}
        </p>
    {% endif %}
    <div class="mt-auto flex items-center gap-2 pt-3">
        <p class="min-w-0 flex-1 truncate text-[10px] text-slate-500">{{ item.feed.name|truncatechars:34 }}</p>
        {% if item.url %}
            <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer" class="shrink-0 rounded-md border border-slate-700/80 px-2.5 py-1.5 text-[11px] font-medium text-slate-200 transition hover:bg-slate-800">
                Open
            </a>
        {% endif %}
    </div>
</article>
