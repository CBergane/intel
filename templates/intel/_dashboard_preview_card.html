{% load humanize %}
<article data-card-layout="dashboard-preview" class="group w-full min-w-0 overflow-hidden flex flex-col rounded-xl border border-line/80 bg-slate-900/60 px-2.5 py-2.5 md:min-h-[11.5rem] sm:px-3 sm:py-3">
    <div class="flex min-w-0 flex-wrap items-start gap-2">
        <a href="{{ item.source_browse_url }}" class="min-w-0 flex-1 truncate text-[10px] font-medium text-slate-300 transition hover:text-white sm:text-[11px]">{{ item.source.name }}</a>
        <time class="max-w-full text-[9px] text-slate-500 sm:ml-auto sm:text-[10px]" datetime="{{ item.activity_at|date:'c' }}" title="{{ item.activity_at|date:'Y-m-d H:i' }} UTC">
            {{ item.activity_at|naturaltime }}
        </time>
    </div>
    <h3 class="mt-1.5 text-[13px] font-medium leading-snug text-white sm:mt-2 sm:text-sm">
        {% if item.url %}
            <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer" class="block hover:text-accent">
                <span class="block overflow-hidden [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2]">
                    {{ item.title }}
                </span>
            </a>
        {% else %}
            <span class="block overflow-hidden [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2]">
                {{ item.title }}
            </span>
        {% endif %}
    </h3>
    {% if item.summary %}
        <p class="mt-1 overflow-hidden text-[12px] leading-[1.1rem] text-slate-400 [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2] sm:mt-1.5 sm:text-[13px] sm:leading-5">
            {{ item.summary|striptags }}
        </p>
    {% endif %}
    <div class="mt-auto flex flex-wrap items-center gap-2 pt-2 sm:pt-3">
        <p class="min-w-0 flex-1 truncate text-[9px] text-slate-500 sm:text-[10px]">{{ item.feed.name|truncatechars:30 }}</p>
        {% if item.url %}
            <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer" class="w-full max-w-full rounded-md border border-slate-700/80 px-2 py-1.5 text-center text-[10px] font-medium text-slate-200 transition hover:bg-slate-800 sm:w-auto sm:px-2.5 sm:text-[11px]">
                Open
            </a>
        {% endif %}
    </div>
</article>
